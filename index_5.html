<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>币安任务中心</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"><\/script>
<style>
:root{
  --bg:#0B0E14;--bg-card:#151A22;--bg-hover:#1C2330;
  --primary:#F0B90B;--primary-glow:rgba(240,185,11,0.12);--primary-border:rgba(240,185,11,0.25);
  --green:#00C087;--green-glow:rgba(0,192,135,0.1);--red:#F6465D;--blue:#3B82F6;--purple:#A855F7;
  --border:rgba(255,255,255,0.06);--text:#EAEAEA;--text-2:#9CA3AF;--text-3:#4B5563;
  --r:12px;--r-sm:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',-apple-system,sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden;}
button,input,select,textarea{font-family:inherit;}
body::before{content:'';position:fixed;top:-300px;right:-300px;width:700px;height:700px;background:radial-gradient(circle,rgba(240,185,11,0.04) 0%,transparent 65%);pointer-events:none;z-index:0;}

/* NAV */
.nav{position:sticky;top:0;z-index:200;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(11,14,20,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-icon{width:32px;height:32px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#0B0E14;box-shadow:0 0 16px rgba(240,185,11,0.3);}
.logo-text{font-size:17px;font-weight:700;}
.nav-links{display:flex;gap:2px;}
.nav-link{padding:7px 14px;border-radius:var(--r-sm);font-size:14px;font-weight:500;color:var(--text-2);cursor:pointer;transition:all 0.2s;border:1px solid transparent;}
.nav-link:hover{color:var(--text);background:rgba(255,255,255,0.04);}
.nav-link.active{color:var(--primary);background:var(--primary-glow);border-color:var(--primary-border);}
.nav-right{display:flex;align-items:center;gap:10px;}
.net-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(0,192,135,0.07);border:1px solid rgba(0,192,135,0.18);border-radius:100px;font-size:12px;font-weight:600;color:#00C087;}
.dot{width:6px;height:6px;border-radius:50%;background:#00C087;box-shadow:0 0 8px #00C087;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.btn-connect{padding:8px 18px;background:var(--primary);color:#0B0E14;font-weight:700;font-size:13px;border:none;border-radius:var(--r-sm);cursor:pointer;transition:all 0.2s;box-shadow:0 0 16px rgba(240,185,11,0.2);}
.btn-connect:hover{box-shadow:0 0 26px rgba(240,185,11,0.4);transform:translateY(-1px);}
.wallet-chip{display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:100px;cursor:pointer;transition:all 0.2s;}
.wallet-chip:hover{border-color:var(--primary-border);}
.wallet-addr{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;}

/* LAYOUT */
.wrap{max-width:1280px;margin:0 auto;padding:32px;position:relative;z-index:1;}
.page{display:none;}
.page.active{display:block;animation:up 0.3s ease;}
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* CARDS */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:24px;transition:border-color 0.2s;}
.card:hover{border-color:rgba(255,255,255,0.1);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--r-sm);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;}
.btn-p{background:var(--primary);color:#0B0E14;}
.btn-p:hover{box-shadow:0 0 24px rgba(240,185,11,0.3);transform:translateY(-1px);}
.btn-p:active{transform:scale(0.97);}
.btn-p:disabled{opacity:0.5;cursor:not-allowed;transform:none !important;box-shadow:none !important;}
.btn-g{background:transparent;color:var(--text-2);border:1px solid var(--border);}
.btn-g:hover{background:rgba(255,255,255,0.04);color:var(--text);}
.btn-d{background:rgba(246,70,93,0.08);color:var(--red);border:1px solid rgba(246,70,93,0.18);}
.btn-d:hover{background:rgba(246,70,93,0.15);}

/* GRID */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.mb8{margin-bottom:8px;}.mb16{margin-bottom:16px;}.mb24{margin-bottom:24px;}.mb32{margin-bottom:32px;}

/* STATS */
.stat{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;transition:all 0.2s;}
.stat:hover{border-color:var(--primary-border);transform:translateY(-2px);}
.stat-l{font-size:11px;font-weight:500;color:var(--text-2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
.stat-v{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;}

/* SECTION HEADER */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.sh-title{font-size:15px;font-weight:700;}

/* TASK CARD */
.tc{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;transition:all 0.25s;display:flex;flex-direction:column;gap:14px;}
.tc:hover{border-color:var(--primary-border);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.3);background:var(--bg-hover);}
.tc.done{opacity:0.55;cursor:default;}
.tc.done:hover{transform:none;box-shadow:none;border-color:var(--border);background:var(--bg-card);}
.tc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.tc-logo{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.tc-info{flex:1;}
.tc-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.tc-desc{font-size:12px;color:var(--text-2);line-height:1.5;}
.tc-meta{display:flex;gap:18px;}
.tc-mi{display:flex;flex-direction:column;gap:2px;}
.tc-ml{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.05em;}
.tc-mv{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text-2);}
.pbar{height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--primary),#F5A623);border-radius:2px;box-shadow:0 0 8px rgba(240,185,11,0.3);}
.tc-foot{display:flex;align-items:center;justify-content:space-between;}
.reward-n{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--primary);}
.reward-l{font-size:10px;color:var(--text-3);text-transform:uppercase;}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap;}
.tab{padding:7px 16px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text-2);background:transparent;transition:all 0.2s;}
.tab:hover{border-color:var(--primary-border);color:var(--primary);}
.tab.active{background:var(--primary-glow);border-color:var(--primary-border);color:var(--primary);}

/* LEVEL BADGES */
.lv{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;border-radius:6px;font-size:12px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:0 6px;}
.lv-S{background:rgba(240,185,11,0.12);color:var(--primary);border:1px solid rgba(240,185,11,0.25);}
.lv-A{background:rgba(168,85,247,0.12);color:var(--purple);border:1px solid rgba(168,85,247,0.25);}
.lv-B{background:rgba(59,130,246,0.12);color:var(--blue);border:1px solid rgba(59,130,246,0.25);}
.lv-C{background:rgba(0,192,135,0.12);color:var(--green);border:1px solid rgba(0,192,135,0.25);}
.lv-D{background:rgba(107,114,128,0.12);color:#6B7280;border:1px solid rgba(107,114,128,0.25);}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;}
.tag-y{background:var(--primary-glow);color:var(--primary);}
.tag-g{background:var(--green-glow);color:var(--green);}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;z-index:500;padding:20px;}
.modal.show{display:flex;}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:500px;width:100%;box-shadow:0 32px 80px rgba(0,0,0,0.6);}
.modal-title{font-size:20px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--text-2);margin-bottom:22px;}

/* FORM */
.fg{margin-bottom:14px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--text-2);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.07em;}
.fi,.fsel,.fta{width:100%;padding:10px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s;}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--primary-border);}
.fta{resize:vertical;min-height:80px;}
.fsel option{background:var(--bg-card);}

/* TOAST */
.toast-wrap{position:fixed;top:72px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px;}
.toast{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 16px;min-width:250px;display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;animation:tin 0.3s ease;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.toast.success{border-left:3px solid var(--green);}
.toast.error{border-left:3px solid var(--red);}
.toast.warning{border-left:3px solid var(--primary);}
@keyframes tin{from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:translateX(0);}}

/* PROFILE */
.prof-banner{background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-hover) 100%);border:1px solid var(--border);border-radius:var(--r);padding:28px;display:flex;gap:20px;align-items:flex-start;position:relative;overflow:hidden;}
.prof-banner::before{content:'';position:absolute;top:-80px;right:-80px;width:250px;height:250px;background:radial-gradient(circle,rgba(240,185,11,0.06) 0%,transparent 70%);pointer-events:none;}
.prof-av{width:72px;height:72px;border-radius:16px;background:linear-gradient(135deg,var(--primary) 0%,#F5A623 100%);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#0B0E14;flex-shrink:0;box-shadow:0 0 24px rgba(240,185,11,0.22);}
.prof-info{flex:1;}
.prof-name{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.prof-addr{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-2);margin-bottom:12px;}
.prof-meta{display:flex;gap:16px;flex-wrap:wrap;}
.prof-mi{font-size:12px;color:var(--text-2);}
.points-n{font-size:32px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--primary);}
.points-l{font-size:11px;color:var(--text-3);text-transform:uppercase;margin-bottom:10px;}

/* SCORE */
.score-g{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:16px;}
.score-item{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;text-align:center;transition:border-color 0.2s;}
.score-item:hover{border-color:var(--primary-border);}
.score-n{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--primary);margin-bottom:4px;}
.score-l{font-size:11px;color:var(--text-3);line-height:1.4;}

/* BIND */
.bind-ok{background:rgba(0,192,135,0.07);border:1px solid rgba(0,192,135,0.2);border-radius:var(--r-sm);padding:14px;}
.bind-ok-title{font-size:13px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.bind-ok-info{font-size:12px;color:var(--text-2);font-family:'JetBrains Mono',monospace;line-height:1.8;}
.soc-btn{width:100%;padding:13px 14px;border-radius:var(--r-sm);border:1px solid var(--border);background:rgba(255,255,255,0.02);color:var(--text-2);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all 0.2s;margin-bottom:10px;}
.soc-btn:hover{border-color:var(--primary-border);color:var(--text);}
.soc-bound{background:rgba(0,192,135,0.07);border:1px solid rgba(0,192,135,0.2);border-radius:var(--r-sm);padding:12px 14px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--green);margin-bottom:10px;}

/* TABLE */
.ptable{width:100%;border-collapse:collapse;}
.ptable th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.07em;border-bottom:1px solid var(--border);}
.ptable td{padding:13px 14px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px;vertical-align:middle;}
.ptable tr:hover td{background:rgba(255,255,255,0.02);}

/* STEP */
.step-item{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px;}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--primary-glow);border:1px solid var(--primary-border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--primary);flex-shrink:0;}
.step-text{font-size:13px;color:var(--text-2);padding-top:2px;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text-3);}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:0.4;}

@media(max-width:768px){
  .nav{padding:0 14px;}.wrap{padding:14px;}
  .g4{grid-template-columns:repeat(2,1fr);}
  .g3{grid-template-columns:1fr;}.g2{grid-template-columns:1fr;}
  .score-g{grid-template-columns:repeat(3,1fr);}
  .nav-links{display:none;}.prof-banner{flex-direction:column;}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="logo" onclick="goPage('home')">
    <div class="logo-icon">B</div>
    <span class="logo-text">币安任务中心</span>
  </div>
  <div class="nav-links">
    <div class="nav-link active" id="nl-home" onclick="goPage('home')">首页</div>
    <div class="nav-link" id="nl-tasks" onclick="authGo('tasks')">任务大厅</div>
    <div class="nav-link" id="nl-profile" onclick="authGo('profile')">个人中心</div>
    <div class="nav-link" id="nl-project" onclick="authGo('project')">项目后台</div>
  </div>
  <div class="nav-right">
    <div class="net-pill"><div class="dot"></div>BSC 测试网</div>
    <button class="btn-connect" id="cb" onclick="doConnect()">连接钱包</button>
    <div class="wallet-chip" id="wc" style="display:none" onclick="authGo('profile')">
      <div class="dot"></div>
      <span class="wallet-addr" id="wa">0x...</span>
    </div>
  </div>
</nav>

<div class="toast-wrap" id="toasts"></div>

<!-- Task Modal -->
<div class="modal" id="taskModal">
  <div class="modal-box">
    <div class="modal-title" id="mt-title">任务详情</div>
    <div class="modal-sub" id="mt-desc"></div>
    <div class="card mb16" style="padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div><div style="font-size:10px;color:var(--text-3);text-transform:uppercase;margin-bottom:4px">奖励</div><div class="reward-n" id="mt-reward"></div></div>
        <div><div style="font-size:10px;color:var(--text-3);text-transform:uppercase;margin-bottom:4px">参与</div><div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700" id="mt-part"></div></div>
        <div><div style="font-size:10px;color:var(--text-3);text-transform:uppercase;margin-bottom:4px">等级</div><div id="mt-lv"></div></div>
      </div>
      <div class="pbar"><div class="pfill" id="mt-prog" style="width:0%"></div></div>
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px">完成步骤</div>
    <div id="mt-steps" style="margin-bottom:20px"></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-p" style="flex:1" id="mt-btn" onclick="confirmTask()">✓ 我已完成任务</button>
      <button class="btn btn-g" onclick="document.getElementById('taskModal').classList.remove('show')">关闭</button>
    </div>
  </div>
</div>

<!-- Publish Modal -->
<div class="modal" id="pubModal">
  <div class="modal-box">
    <div class="modal-title">发布新任务</div>
    <div class="modal-sub">无需审核，发布后立即上线</div>
    <div class="fg"><label class="fl">任务标题</label><input type="text" class="fi" id="p-title" placeholder="输入任务标题..."></div>
    <div class="fg"><label class="fl">任务描述</label><textarea class="fta" id="p-desc" placeholder="描述用户需要完成什么..."></textarea></div>
    <div class="g2" style="gap:10px">
      <div class="fg"><label class="fl">分类</label><select class="fsel" id="p-cat"><option value="binance">币安广场</option><option value="twitter">X (Twitter)</option><option value="telegram">Telegram</option><option value="other">其他</option></select></div>
      <div class="fg"><label class="fl">最低等级</label><select class="fsel" id="p-lv"><option value="D">D 级</option><option value="C">C 级</option><option value="B">B 级</option><option value="A">A 级</option><option value="S">S 级</option></select></div>
    </div>
    <div class="g2" style="gap:10px">
      <div class="fg"><label class="fl">积分奖励</label><input type="number" class="fi" id="p-reward" placeholder="50"></div>
      <div class="fg"><label class="fl">人数上限</label><input type="number" class="fi" id="p-max" placeholder="1000"></div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-p" style="flex:1" onclick="pubTask()">发布任务</button>
      <button class="btn btn-g" onclick="document.getElementById('pubModal').classList.remove('show')">取消</button>
    </div>
  </div>
</div>

<div class="wrap">

<!-- HOME -->
<div class="page active" id="page-home">
  <div style="background:linear-gradient(135deg,#151A22 0%,#1C2330 60%,#151A22 100%);border:1px solid var(--border);border-radius:16px;padding:48px 40px;margin-bottom:28px;position:relative;overflow:hidden">
    <div style="position:absolute;top:-60px;right:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(240,185,11,0.08) 0%,transparent 70%);pointer-events:none"></div>
    <div style="position:relative;z-index:1;max-width:580px">
      <div style="display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:var(--primary-glow);border:1px solid var(--primary-border);border-radius:100px;font-size:12px;font-weight:700;color:var(--primary);margin-bottom:18px"><div class="dot"></div>BSC 测试网 · 实时任务</div>
      <div style="font-size:38px;font-weight:800;line-height:1.15;margin-bottom:14px;letter-spacing:-0.02em">完成任务<br><span style="color:var(--primary)">赚取积分奖励</span></div>
      <div style="color:var(--text-2);font-size:15px;margin-bottom:24px">连接钱包 · 绑定账号 · 完成任务 · 获得积分</div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-p" onclick="authGo('tasks')">浏览全部任务</button>
        <button class="btn btn-g" onclick="authGo('profile')">我的中心</button>
      </div>
    </div>
  </div>
  <div class="g4 mb32">
    <div class="stat"><div class="stat-l">👥 平台用户</div><div class="stat-v">12,584</div></div>
    <div class="stat"><div class="stat-l">📋 进行中任务</div><div class="stat-v">186</div></div>
    <div class="stat"><div class="stat-l">💰 总发放奖励</div><div class="stat-v">$48.2K</div></div>
    <div class="stat"><div class="stat-l">⭐ 平台评分</div><div class="stat-v">9.8</div></div>
  </div>

      <div class="soc-bound" id="tg-ok" style="display:none"><span>✈️</span>Telegram 已绑定<span style="margin-left:auto;color:var(--green);font-size:12px">+10分 ✓</span></div>
      <div style="margin-top:8px;padding:12px;background:rgba(255,255,255,0.02);border-radius:8px;font-size:12px;color:var(--text-3);line-height:1.6">💡 绑定社交账号提升信用评分，解锁更高奖励任务</div>

      <div class="score-item"><div class="score-n" id="sc-soc">0</div><div class="score-l">社交绑定<br><span style="color:var(--text-3)">(20%)</span></div></div>

        <thead><tr><th>任务名称</th><th>分类</th><th>参与/上限</th><th>进度</th><th>奖励</th><th>状态</th><th>操作</th></tr></thead>
        <tbody id="proj-tbody"></tbody>
      </table>

<script>
const S={
  account:null,points:0,done:new Set(),level:'D',score:0,
  binance:null,twitter:false,telegram:false,myTasks:[],cur:null,
  load(){try{const d=JSON.parse(localStorage.getItem('btc-v3')||'{}');this.account=d.account||null;this.points=d.points||0;this.done=new Set(d.done||[]);this.level=d.level||'D';this.score=d.score||0;this.binance=d.binance||null;this.twitter=d.twitter||false;this.telegram=d.telegram||false;this.myTasks=d.myTasks||[];}catch(e){}},
  save(){try{localStorage.setItem('btc-v3',JSON.stringify({account:this.account,points:this.points,done:[...this.done],level:this.level,score:this.score,binance:this.binance,twitter:this.twitter,telegram:this.telegram,myTasks:this.myTasks}));}catch(e){}}
};

const TASKS=[
  {id:'t1',cat:'binance',title:'关注币安官方账号',desc:'在币安广场关注官方账号并点赞最新帖子',reward:50,max:5000,filled:1840,level:'D',steps:['打开币安广场官方账号页面','点击关注按钮','为最新帖子点赞','返回此页面点击完成确认']},
  {id:'t2',cat:'twitter',title:'转发推文获积分',desc:'转发币安官方最新推文，需包含 #BNB 标签',reward:100,max:5000,filled:2100,level:'C',steps:['打开 X (Twitter)','找到 @binance 最新推文','转发并添加 #BNB 标签','返回此页面点击完成确认']},
  {id:'t3',cat:'telegram',title:'加入官方 TG 社区',desc:'加入官方 Telegram 群组并完成新人验证',reward:40,max:3000,filled:1500,level:'D',steps:['打开 Telegram App','搜索 @BinanceEnglish','点击加入群组','完成机器人验证','返回此页面点击完成确认']},
  {id:'t4',cat:'binance',title:'点赞官方今日帖',desc:'为币安广场官方今日发布的帖子点赞并评论',reward:30,max:10000,filled:4500,level:'D',steps:['打开币安广场','找到今日官方帖子','点赞并评论','返回点击完成确认']},
  {id:'t5',cat:'other',title:'加入 Discord 频道',desc:'加入官方 Discord 并在新人频道发自我介绍',reward:45,max:2000,filled:890,level:'C',steps:['打开 Discord','使用邀请链接加入服务器','前往 #welcome 频道','发一条自我介绍','返回点击完成确认']},
  {id:'t6',cat:'twitter',title:'评论并互动推文',desc:'对指定推文发表有价值的评论，不少于20字',reward:80,max:4000,filled:1200,level:'C',steps:['打开指定推文链接','写下20字以上有价值的评论','点赞该推文','返回此页面点击完成确认']},
];

const catBg={binance:'rgba(240,185,11,0.1)',twitter:'rgba(29,161,242,0.1)',telegram:'rgba(0,136,204,0.1)',other:'rgba(107,114,128,0.1)'};
const catEmoji={binance:'🟨',twitter:'🐦',telegram:'✈️',other:'🔗'};

function allT(){return [...TASKS,...S.myTasks];}

async function doConnect(){
  try{
    let prov=window.ethereum||window.okxwallet||window.BinanceChain;
    if(window.ethereum&&window.ethereum.providers&&window.ethereum.providers.length)prov=window.ethereum.providers[0];
    if(!prov){toast('请先安装浏览器钱包插件（MetaMask、OKX 等）','error');return;}
    toast('请在钱包中确认连接...','warning');
    const acc=await prov.request({method:'eth_requestAccounts'});
    if(acc&&acc.length){S.account=acc[0];S.save();updNav();toast('钱包连接成功！','success');}
  }catch(e){toast(e.code===4001?'连接已取消':'连接失败: '+e.message,'error');}
}

function doDisconnect(){S.account=null;S.save();updNav();goPage('home');toast('已断开连接','warning');}

function updNav(){
  const cb=document.getElementById('cb'),wc=document.getElementById('wc'),wa=document.getElementById('wa');
  if(S.account){cb.style.display='none';wc.style.display='flex';wa.textContent=S.account.slice(0,6)+'...'+S.account.slice(-4);}
  else{cb.style.display='';wc.style.display='none';}
}

function goPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  const nl=document.getElementById('nl-'+id);if(nl)nl.classList.add('active');
  if(id==='tasks')renderAll();
  if(id==='profile')renderProf();
  if(id==='project')renderProj();
  window.scrollTo({top:0,behavior:'smooth'});
}

function authGo(id){if(!S.account){toast('请先连接钱包','warning');setTimeout(doConnect,500);return;}goPage(id);}

function taskCard(t){
  const done=S.done.has(t.id);
  const pct=Math.min(Math.round((t.filled/t.max)*100),100);
  const tid = t.id;
  const onclickAttr = done ? '' : `openTask('${tid}')`;
  const btnOnclick = done ? '' : `openTask('${tid}')`;
  
  return `<div class="tc${done?' done':''}" onclick="${onclickAttr}">
    <div class="tc-head">
      <div class="tc-logo" style="background:${catBg[t.cat]||catBg.other}">${catEmoji[t.cat]||'🔗'}</div>
      <div class="tc-info">
        <div class="tc-title">${t.title}</div>
        <div class="tc-desc">${t.desc}</div>
      </div>
      <div class="lv lv-${t.level}">${t.level}</div>
    </div>
    <div class="tc-meta">
      <div class="tc-mi"><div class="tc-ml">参与</div><div class="tc-mv">${t.filled.toLocaleString()}</div></div>
      <div class="tc-mi"><div class="tc-ml">上限</div><div class="tc-mv">${t.max.toLocaleString()}</div></div>
      <div class="tc-mi"><div class="tc-ml">完成率</div><div class="tc-mv">${pct}%</div></div>
    </div>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    <div class="tc-foot">
      <div><div class="reward-n">+${t.reward}</div><div class="reward-l">积分</div></div>
      <button class="btn ${done?'btn-g':'btn-p'}" ${done?'disabled':''} onclick="event.stopPropagation();${btnOnclick}">${done?'✓ 已完成':'参与任务'}</button>
    </div>
  </div>`;
}

function renderHome(){
  ['binance','twitter','telegram','other'].forEach(cat=>{
    const el=document.getElementById('h-'+cat);
    if(el)el.innerHTML=allT().filter(t=>t.cat===cat).slice(0,3).map(taskCard).join('');
  });
}

function renderAll(cat='all'){
  const tasks=cat==='all'?allT():allT().filter(t=>t.cat===cat);
  const el=document.getElementById('all-tasks');
  if(el)el.innerHTML=tasks.length?tasks.map(taskCard).join(''):'<div class="empty"><div class="empty-icon">📋</div><div>暂无任务</div></div>';
}

function filterT(cat,btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderAll(cat);}

function openTask(id){
  if(!S.account){toast('请先连接钱包','error');setTimeout(doConnect,500);return;}
  const t=allT().find(x=>x.id===id);if(!t)return;S.cur=t;
  const pct=Math.min(Math.round((t.filled/t.max)*100),100);
  document.getElementById('mt-title').textContent=t.title;
  document.getElementById('mt-desc').textContent=t.desc;
  document.getElementById('mt-reward').textContent='+'+t.reward+' 积分';
  document.getElementById('mt-part').textContent=t.filled.toLocaleString();
  document.getElementById('mt-lv').innerHTML='<div class="lv lv-'+t.level+'">'+t.level+'</div>';
  document.getElementById('mt-prog').style.width=pct+'%';
  const steps=t.steps||['完成任务要求','返回点击确认'];
  document.getElementById('mt-steps').innerHTML=steps.map((s,i)=>'<div class="step-item"><div class="step-num">'+(i+1)+'</div><div class="step-text">'+s+'</div></div>').join('');
  const btn=document.getElementById('mt-btn');btn.textContent='✓ 我已完成任务';btn.disabled=false;btn.className='btn btn-p';
  document.getElementById('taskModal').classList.add('show');
}

function confirmTask(){
  const t=S.cur;if(!t)return;
  const btn=document.getElementById('mt-btn');btn.textContent='🤖 AI 验证中...';btn.disabled=true;
  setTimeout(()=>{
    S.done.add(t.id);S.points+=t.reward;S.save();
    btn.textContent='✅ 验证通过！';btn.className='btn btn-g';
    toast('完成！获得 '+t.reward+' 积分','success');
    renderHome();renderAll();
    setTimeout(()=>document.getElementById('taskModal').classList.remove('show'),1500);
  },2000);
}

function renderProf(){
  if(!S.account)return;
  document.getElementById('pav').textContent=S.account.slice(2,3).toUpperCase();
  document.getElementById('pname').textContent='User_'+S.account.slice(2,8);
  document.getElementById('paddr').textContent=S.account;
  document.getElementById('ppoints').textContent=S.points.toLocaleString();
  document.getElementById('pdone').textContent=S.done.size;
  document.getElementById('pscore').textContent=S.score;
  const lb=document.getElementById('plv');lb.textContent=S.level;lb.className='lv lv-'+S.level;
  if(S.binance){document.getElementById('bnc-form').style.display='none';document.getElementById('bnc-ok').style.display='';document.getElementById('bnc-ok-info').innerHTML='用户名: '+S.binance.user+'<br>粉丝: '+S.binance.fans.toLocaleString()+'<br>发帖: '+S.binance.posts.toLocaleString()+'<br>获赞: '+S.binance.likes.toLocaleString();}
  if(S.twitter){document.getElementById('tw-sec').style.display='none';document.getElementById('tw-ok').style.display='flex';}
  if(S.telegram){document.getElementById('tg-sec').style.display='none';document.getElementById('tg-ok').style.display='flex';}
  updScore();
  if(S.done.size){
    const rows=[...S.done].map(id=>{const t=allT().find(x=>x.id===id);if(!t)return'';return'<tr><td style="color:var(--text);font-weight:600">'+t.title+'</td><td><span class="tag tag-g">已完成</span></td><td style="font-family:JetBrains Mono,monospace;color:var(--primary);font-weight:700">+'+t.reward+'</td></tr>';}).join('');
    document.getElementById('hist').innerHTML='<table class="ptable"><thead><tr><th>任务</th><th>状态</th><th>奖励</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }else{document.getElementById('hist').innerHTML='<div class="empty"><div class="empty-icon">📋</div><div>暂无任务历史</div></div>';}
}

function doBind(){
  const url=document.getElementById('bnc-url').value.trim();
  const fans=parseInt(document.getElementById('bnc-fans').value);
  const posts=parseInt(document.getElementById('bnc-posts').value);
  const likes=parseInt(document.getElementById('bnc-likes').value);
  if(!url||!fans||!posts||!likes){toast('请填写所有字段','error');return;}
  const m=url.match(/profile\/([^/?]+)/);
  S.binance={user:m?m[1]:'unknown',fans,posts,likes};
  calcScore();S.save();renderProf();toast('币安广场账号绑定成功！','success');
}

function bindSoc(p){
  if(p==='twitter'){
    window.open('https://twitter.com/intent/follow?screen_name=binance','_blank');
    setTimeout(()=>{S.twitter=true;calcScore();S.save();document.getElementById('tw-sec').style.display='none';document.getElementById('tw-ok').style.display='flex';toast('X (Twitter) 绑定成功！+10分','success');updScore();},1500);
  }else{
    window.open('https://t.me/binance','_blank');
    setTimeout(()=>{S.telegram=true;calcScore();S.save();document.getElementById('tg-sec').style.display='none';document.getElementById('tg-ok').style.display='flex';toast('Telegram 绑定成功！+10分','success');updScore();},1500);
  }
}

function calcScore(){
  let a=0,b=0,c=0,d=0,e=0;
  if(S.binance){const{fans,posts,likes}=S.binance;a=Math.min((fans/100000)*30,30);b=Math.min((posts/10000)*30,30);c=Math.min((likes/100000)*10,10);const r=posts>0?likes/posts:0;d=Math.min((r/50)*10,10);}
  if(S.twitter)e+=10;if(S.telegram)e+=10;
  S.score=Math.round(a+b+c+d+e);
  const fans=S.binance?S.binance.fans:0;
  S.level=fans>=60000?'S':fans>=30000?'A':fans>=10000?'B':fans>=5000?'C':'D';
  S.save();
}

function updScore(){
  let a=0,b=0,c=0,d=0,e=0;
  if(S.binance){const{fans,posts,likes}=S.binance;a=Math.min((fans/100000)*30,30);b=Math.min((posts/10000)*30,30);c=Math.min((likes/100000)*10,10);const r=posts>0?likes/posts:0;d=Math.min((r/50)*10,10);}
  if(S.twitter)e+=10;if(S.telegram)e+=10;
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=Math.round(v);};
  set('sc-fans',a);set('sc-posts',b);set('sc-likes',c);set('sc-heat',d);set('sc-soc',e);
  const ts=document.getElementById('total-score');if(ts)ts.textContent=S.score+' / 100';
  const ps=document.getElementById('pscore');if(ps)ps.textContent=S.score;
  const lb=document.getElementById('plv');if(lb){lb.textContent=S.level;lb.className='lv lv-'+S.level;}
}

function renderProj(){
  const mt=S.myTasks;
  document.getElementById('proj-n').textContent=mt.length;
  document.getElementById('proj-p').textContent=mt.reduce((s,t)=>s+t.filled,0).toLocaleString();
  document.getElementById('proj-pay').textContent=mt.reduce((s,t)=>s+(t.reward*Math.floor(t.filled*0.8)),0).toLocaleString();
  const tbody=document.getElementById('proj-tbody');
  if(!mt.length){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-3)">还未发布任务</td></tr>';return;}
  tbody.innerHTML=mt.map(t=>{
    const pct=Math.round((t.filled/t.max)*100);
    return '<tr><td style="color:var(--text);font-weight:600">'+t.title+'</td><td><span class="tag tag-y">'+t.cat+'</span></td><td style="font-family:JetBrains Mono,monospace">'+t.filled+'/'+t.max+'</td><td><div style="display:flex;align-items:center;gap:8px"><div class="pbar" style="width:80px"><div class="pfill" style="width:'+pct+'%"></div></div><span style="font-size:12px;color:var(--text-2)">'+pct+'%</span></div></td><td style="color:var(--primary);font-family:JetBrains Mono,monospace;font-weight:700">+'+t.reward+'</td><td><span class="tag tag-g">进行中</span></td><td><div style="display:flex;gap:6px"><button class="btn btn-g" style="padding:4px 10px;font-size:12px" onclick="toast('编辑功能开发中','warning')">编辑</button><button class="btn btn-d" style="padding:4px 10px;font-size:12px" onclick="endTask(''+t.id+'')">终止</button></div></td></tr>';
  }).join('');
}

function pubTask(){
  const title=document.getElementById('p-title').value.trim();
  const desc=document.getElementById('p-desc').value.trim();
  const cat=document.getElementById('p-cat').value;
  const lv=document.getElementById('p-lv').value;
  const reward=parseInt(document.getElementById('p-reward').value);
  const max=parseInt(document.getElementById('p-max').value);
  if(!title||!desc||!reward||!max){toast('请填写所有字段','error');return;}
  const t={id:'my_'+Date.now(),cat,title,desc,reward,max,filled:0,level:lv,steps:['完成'+title,'返回点击确认完成']};
  S.myTasks.push(t);TASKS.push(t);S.save();
  document.getElementById('pubModal').classList.remove('show');
  ['p-title','p-desc','p-reward','p-max'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  renderProj();toast('任务发布成功！已立即上线','success');
}

function endTask(id){
  if(!confirm('确定终止此任务？'))return;
  S.myTasks=S.myTasks.filter(t=>t.id!==id);
  const i=TASKS.findIndex(t=>t.id===id);if(i>=0)TASKS.splice(i,1);
  S.save();renderProj();toast('任务已终止','warning');
}

function toast(msg,type){
  type=type||'success';
  const t=document.createElement('div');t.className='toast '+type;
  const icons={success:'✓',error:'✗',warning:'⚠'};
  t.innerHTML='<span>'+(icons[type]||'•')+'</span><span>'+msg+'</span>';
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(10px)';t.style.transition='all 0.3s';setTimeout(()=>t.remove(),300);},3000);
}

document.getElementById('taskModal').addEventListener('click',function(e){if(e.target.id==='taskModal')e.target.classList.remove('show');});
document.getElementById('pubModal').addEventListener('click',function(e){if(e.target.id==='pubModal')e.target.classList.remove('show');});

window.addEventListener('DOMContentLoaded',function(){
  S.load();updNav();renderHome();if(S.account)calcScore();
  setInterval(function(){if(document.getElementById('page-tasks').classList.contains('active'))renderAll();},15000);
  var prov=window.ethereum||window.okxwallet;
  if(prov&&prov.on)prov.on('accountsChanged',function(a){if(!a.length){S.account=null;S.save();updNav();goPage('home');}else{S.account=a[0];S.save();updNav();}});
});
<\/script>
