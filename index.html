<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>币安任务中心</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0B0E14;--bg-card:#151A22;--primary:#F0B90B;--text:#EAEAEA;--text-2:#9CA3AF;--text-3:#6B7280;--border:rgba(255,255,255,0.08);--green:#00C087}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh}
.nav{background:rgba(11,14,20,0.95);backdrop-filter:blur(20px);padding:15px 30px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.nav-left{display:flex;gap:25px;align-items:center}
.nav-left h2{font-size:17px;cursor:pointer}
.nav-links{display:flex;gap:5px}
.nav-link{padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;border:1px solid transparent;color:var(--text-2)}
.nav-link:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.nav-link.active{color:var(--primary);background:rgba(240,185,11,0.1);border-color:rgba(240,185,11,0.2)}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px;transition:all 0.2s}
.btn-primary{background:var(--primary);color:#000}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(240,185,11,0.3)}
.btn-secondary{background:rgba(255,255,255,0.05);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:rgba(246,70,93,0.1);color:#F6465D;border:1px solid rgba(246,70,93,0.2)}
.container{max-width:1280px;margin:0 auto;padding:30px}
.page{display:none}
.page.active{display:block;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.section{margin-bottom:35px}
.section h3{margin-bottom:20px;font-size:16px;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;transition:all 0.25s}
.card:hover{border-color:rgba(240,185,11,0.3);transform:translateY(-2px)}
.task-card{cursor:pointer}
.task-card h4{margin-bottom:10px;font-size:15px}
.task-card p{color:var(--text-2);font-size:13px;margin-bottom:16px;line-height:1.6}
.reward{color:var(--primary);font-size:28px;font-weight:700;font-family:monospace}
.badge{display:inline-block;padding:4px 11px;background:rgba(240,185,11,0.12);color:var(--primary);border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.stat-card{text-align:center}
.stat-card .label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.stat-card .value{font-size:32px;font-weight:700;font-family:monospace;color:var(--primary)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal.show{display:flex}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:520px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,0.6)}
.modal-box h3{font-size:20px;margin-bottom:18px}
.wallet-option{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all 0.2s}
.wallet-option:hover{border-color:var(--primary);background:rgba(240,185,11,0.05)}
.wallet-icon{width:48px;height:48px;border-radius:10px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:24px}
.wallet-info{flex:1}
.wallet-name{font-size:15px;font-weight:700;margin-bottom:4px}
.wallet-desc{font-size:12px;color:var(--text-2)}
.qr-container{text-align:center;padding:20px}
.qr-code{background:white;padding:20px;border-radius:12px;display:inline-block;margin:20px 0}
.wallet-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;background:var(--bg-card);border:1px solid var(--border);border-radius:100px;font-family:monospace;font-size:13px;font-weight:600;cursor:pointer}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.form-input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;transition:border 0.2s}
.form-input:focus{outline:none;border-color:rgba(240,185,11,0.4)}
@media(max-width:768px){.grid{grid-template-columns:1fr}.grid-2,.grid-4{grid-template-columns:1fr}.nav-links{display:none}.section>div[style*="grid-template-columns:repeat(4"]{grid-template-columns:repeat(2,1fr)!important}.container{padding:15px}.nav{padding:12px 16px}}
</style>
<!-- WalletConnect Web3Modal -->
<script type="module">
  import { createWeb3Modal, defaultConfig } from 'https://esm.sh/@web3modal/ethers5@4.1.11'
  import { providers } from 'https://esm.sh/ethers@5.7.2'

  const projectId = 'c3ee3e3c3e3e3e3e3e3e3e3e3e3e3e3e' // 公共测试ID，生产环境需替换

  const chains = [{
    chainId: 97,
    name: 'BSC Testnet',
    currency: 'BNB',
    explorerUrl: 'https://testnet.bscscan.com',
    rpcUrl: 'https://data-seed-prebsc-1-s1.binance.org:8545'
  }]

  const metadata = {
    name: '币安任务中心',
    description: 'Web3任务积分平台',
    url: window.location.origin,
    icons: ['https://avatars.githubusercontent.com/u/37784886']
  }

  const ethersConfig = defaultConfig({metadata})
  
  window.web3modal = createWeb3Modal({
    ethersConfig,
    chains,
    projectId,
    enableAnalytics: false,
    themeMode: 'dark',
    themeVariables: {
      '--w3m-accent': '#F0B90B'
    }
  })

  window.web3modal.subscribeProvider(async ({provider, address}) => {
    if(address){
      window.connectedAddress = address
      window.updateWalletUI && window.updateWalletUI(address)
    }
  })
</script>
</head>
<body>

<div class="nav">
  <div class="nav-left">
    <h2 onclick="goPage('home')">🪙 币安任务中心</h2>
    <div class="nav-links">
      <div class="nav-link active" id="nav-home" onclick="goPage('home')">首页</div>
      <div class="nav-link" id="nav-tasks" onclick="goPage('tasks')">任务大厅</div>
    </div>
  </div>
  <div>
    <button class="btn btn-primary" id="connectBtn" onclick="connectWallet()">连接钱包</button>
    <div class="wallet-chip" id="walletChip" style="display:none">
      <div class="dot"></div>
      <span id="walletAddr"></span>
    </div>
  </div>
</div>

<div class="container">

<!-- 首页 -->
<div class="page active" id="page-home">
  <div class="section">
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:25px;overflow:hidden">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="background:rgba(240,185,11,0.15);color:var(--primary);padding:4px 12px;border-radius:6px;font-size:12px;font-weight:700;white-space:nowrap">📢 公告</div>
        <div style="flex:1;color:var(--text-2);font-size:14px;white-space:nowrap;overflow:hidden">
          <div style="display:inline-block;padding-left:100%;animation:scroll 30s linear infinite">
            🎉 平台已累计发放 $48,000 奖励！· 🔥 新任务上线：完成可获得双倍积分 · 💎 支持手机钱包连接
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="section">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px">
      <div class="stat-card card"><div class="label">平台用户</div><div class="value">12,584</div></div>
      <div class="stat-card card"><div class="label">活跃任务</div><div class="value">186</div></div>
      <div class="stat-card card"><div class="label">已发奖励</div><div class="value">$48K</div></div>
      <div class="stat-card card"><div class="label">平台评分</div><div class="value">9.8</div></div>
    </div>
  </div>
  
  <div class="section">
    <h3>🔥 热门任务</h3>
    <div class="grid" id="homeTaskList"></div>
  </div>
</div>

<!-- 任务大厅 -->
<div class="page" id="page-tasks">
  <div class="section">
    <h3>📋 全部任务</h3>
    <div class="grid" id="allTaskList"></div>
  </div>
</div>

</div>

<!-- 任务模态框 -->
<div class="modal" id="taskModal">
  <div class="modal-box">
    <h3 id="modalTitle">任务详情</h3>
    <p style="color:var(--text-2);margin-bottom:16px" id="modalDesc"></p>
    <div style="font-size:22px;color:var(--primary);font-weight:700;margin-bottom:16px" id="modalReward"></div>
    
    <div style="background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:700;color:var(--text-2);margin-bottom:12px">📸 提交完成证明</div>
      <input type="file" id="proofImage" accept="image/*" style="display:none">
      <button class="btn btn-secondary" style="width:100%;margin-bottom:10px" onclick="document.getElementById('proofImage').click()">📷 上传截图</button>
      <input type="text" id="proofLink" class="form-input" placeholder="或粘贴帖子链接..." style="font-size:13px">
    </div>
    
    <button class="btn btn-primary" style="width:100%" onclick="submitTask()">✓ 提交并完成</button>
    <button class="btn btn-secondary" style="width:100%;margin-top:10px" onclick="closeModal()">取消</button>
  </div>
</div>

<script>
const tasks=[
  {id:1,cat:'binance',title:'关注币安广场官方账号',desc:'在币安广场关注官方账号并点赞最新帖子',reward:50},
  {id:2,cat:'twitter',title:'转发推文获积分',desc:'转发币安官方最新推文，需包含 #BNB 标签',reward:100},
  {id:3,cat:'telegram',title:'加入官方 TG 社区',desc:'加入官方 Telegram 群组并完成新人验证',reward:40},
  {id:4,cat:'binance',title:'发布优质内容',desc:'在币安广场发布一篇关于加密货币的优质内容',reward:150},
  {id:5,cat:'twitter',title:'评论并互动',desc:'对指定推文发表有价值的评论，不少于20字',reward:80},
  {id:6,cat:'other',title:'邀请好友注册',desc:'邀请3位好友注册并完成首次任务',reward:200}
];

const STATE={
  wallet:null,
  points:0,
  completed:new Set(),
  load(){try{const d=JSON.parse(localStorage.getItem('btc-data')||'{}');this.wallet=d.wallet;this.points=d.points||0;this.completed=new Set(d.completed||[]);}catch(e){}},
  save(){try{localStorage.setItem('btc-data',JSON.stringify({wallet:this.wallet,points:this.points,completed:[...this.completed]}));}catch(e){}}
};

let currentTask=null;

function renderTasks(el,list){
  const html=list.map(t=>`
    <div class="card task-card" onclick="openTask(${t.id})">
      <div style="margin-bottom:12px"><span class="badge">${t.cat}</span></div>
      <h4>${t.title}</h4>
      <p>${t.desc}</p>
      <div class="reward">+${t.reward} 积分</div>
    </div>
  `).join('');
  document.getElementById(el).innerHTML=html;
}

function goPage(id){
  if(id!=='home'&&!STATE.wallet){alert('请先连接钱包');connectWallet();return;}
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('nav-'+id)?.classList.add('active');
}

function openTask(id){
  if(!STATE.wallet){alert('请先连接钱包');return;}
  currentTask=tasks.find(t=>t.id===id);
  if(!currentTask)return;
  document.getElementById('modalTitle').textContent=currentTask.title;
  document.getElementById('modalDesc').textContent=currentTask.desc;
  document.getElementById('modalReward').textContent=`奖励: +${currentTask.reward} 积分`;
  document.getElementById('taskModal').classList.add('show');
}

function closeModal(){
  document.getElementById('taskModal').classList.remove('show');
}

function submitTask(){
  if(!currentTask)return;
  const link=document.getElementById('proofLink').value.trim();
  if(!link){alert('❌ 请上传截图或粘贴链接');return;}
  STATE.completed.add(currentTask.id);
  STATE.points+=currentTask.reward;
  STATE.save();
  alert(`✅ 任务完成！获得 ${currentTask.reward} 积分`);
  document.getElementById('proofLink').value='';
  closeModal();
}

async function connectWallet(){
  try{
    await window.web3modal.open()
  }catch(e){
    console.error(e);
    alert('连接失败: '+(e.message||'用户取消'));
  }
}

window.updateWalletUI = function(address){
  STATE.wallet=address;
  STATE.save();
  const btn=document.getElementById('connectBtn');
  const chip=document.getElementById('walletChip');
  const addr=document.getElementById('walletAddr');
  btn.style.display='none';
  chip.style.display='inline-flex';
  addr.textContent=address.slice(0,6)+'...'+address.slice(-4);
  alert('钱包连接成功！');
}

document.getElementById('taskModal').addEventListener('click',e=>{
  if(e.target.id==='taskModal')closeModal();
});

STATE.load();
renderTasks('homeTaskList',tasks.slice(0,6));
renderTasks('allTaskList',tasks);
if(STATE.wallet){
  document.getElementById('connectBtn').style.display='none';
  document.getElementById('walletChip').style.display='inline-flex';
  document.getElementById('walletAddr').textContent=STATE.wallet.slice(0,6)+'...'+STATE.wallet.slice(-4);
}
</script>
</body>
</html>
